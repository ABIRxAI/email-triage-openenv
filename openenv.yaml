name: email-triage-env
description: Simulates real-world email triage, spam detection, prioritization, and response handling
version: 2.0

environment:
  entry_point: env.email_env:EmailEnv

observation_space:
  type: object
  properties:
    email_id:
      type: integer
    subject:
      type: string
    body:
      type: string
    sender:
      type: string
    priority:
      type: string
    attachments:
      type: boolean
    thread_id:
      type: string
    history:
      type: array
      items:
        type: string

action_space:
  type: object
  properties:
    action_type:
      type: string
      enum: [mark_spam, mark_important, reply, ignore, escalate]
    content:
      type: string

tasks:
  - name: spam_detection
    description: Identify and mark spam or phishing emails

  - name: priority_handling
    description: Detect and handle high-priority emails

  - name: escalation_handling
    description: Escalate critical or legal emails

  - name: reply_handling
    description: Generate appropriate replies to emails

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Reward based on correctness, spam detection,
    priority handling, and response quality.